<nav id="side-menu">

    </div>

</nav>

<!--==========================
ヘッダー
===========================-->

<header>

    <h1 class="category">中華レシピー覧</h1>

    <div class="menu" id="open">

        <span></span>
        <span></span>
        <span></span>

    </div>

</header>

<!--==========================
一覧
===========================-->

<main class="recipe-list">

    <a href="namul.html" class="card">

        <div class="photo">

            <div class="tape purple"></div>

            <img src="namul/namul.png" alt="もやしナムル">

        </div>

        <h2>もやしナムル</h2>

        <p class="level">★☆☆</p>

    </a>

    <a href="cucumber.html" class="card">

        <div class="photo">

            <div class="tape pink"></div>

            <img src="cucumber/cucumber.png" alt="きゅうりの中華和え">

        </div>

        <h2>きゅうりの中華和え</h2>

        <p class="level">★☆☆</p>

    </a>

    <a href="kakitama.html" class="card">

        <div class="photo">

            <div class="tape green"></div>

            <img src="kakitama/kakitama.png" alt="中華風かきたまスープ">

        </div>

        <h2>中華風かきたまスープ</h2>

        <p class="level">★★☆</p>

    </a>

    <a href="harusame.html" class="card">

        <div class="photo">

            <div class="tape orange"></div>

            <img src="harusame/harusame.png" alt="春雨サラダ">

        </div>

        <p class="level">★★☆</p>

    </a>

    <a href="yasaiitame.html" class="card">

        <div class="photo">

            <div class="tape blue"></div>

            <img src="yasaiitame/yasaiitame.png" alt="野菜炒め">

        </div>

        <h2>野菜炒め</h2>

        <p class="level">★★★</p>

    </a>

    <a href="friedrice.html" class="card">

        <div class="photo">

            <div class="tape lime"></div>

            <img src="friedrice/friedrice.png" alt="チャーハン">

        </div>

        <h2>チャーハン</h2>

        <p class="level">★★★</p>

    </a>

</main>

<script>

const open=document.getElementById("open");
const close=document.getElementById("close");
const menu=document.getElementById("side-menu");
const bg=document.getElementById("menu-bg");

open.onclick=function(){

    menu.classList.add("show");
    bg.classList.add("show");

}

close.onclick=function(){

    menu.classList.remove("show");
    bg.classList.remove("show");

}

bg.onclick=function(){

    menu.classList.remove("show");
    bg.classList.remove("show");

}

</script>
